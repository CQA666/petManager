# 服务器配置
server:
  port: 8889
  servlet:
    context-path: /
spring:
  # 应用配置
  application:
    name: petBack
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/petManager?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: root
    password: 123456
  # 安全配置
  security:
    user:
      name: admin
      password: admin
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  # 静态资源配置
  mvc:
    static-path-pattern: /**
  web:
    resources:
      static-locations: classpath:/static/
  # 邮件配置
  mail:
    host: smtp.qq.com
    username: 2922367884@qq.com
    password: hvzkczdyzadxdcjd
    default-encoding: utf-8
    port: 587
    properties:
      mail:
        debug: true
        smtp:
          auth: true
          ssl:
            enable: true
            protocols: TLSv1.2
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory
            port: 465

# MyBatis 配置
mybatis:
  configuration:
    map-underscore-to-camel-case: true
    use-built-in-alias-types: true

# MyBatis-Plus 配置
mybatis-plus:
  mapper-locations: classpath:/mapper/*.xml
  global-config:
    db-config:
      id-type: auto
      use-id-generator: false
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# SpringDoc (Swagger) 配置
springdoc:
  enable-spring-security: false
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
  paths-to-match: /**
  packages-to-scan: com.example.petback.controller

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh_cn

